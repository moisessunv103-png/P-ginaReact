  <defs>
    <style>
      .logo-bg { fill: #e74c3c; }
      .logo-text { fill: white; font-family: Arial, sans-serif; font-weight: bold; font-size: 60px; text-anchor: middle; }
    </style>
  </defs>
  
  <!-- Fondo circular -->
